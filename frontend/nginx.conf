# =============================================================================
# NGINX CONFIGURATION
# =============================================================================
# NGINX is a high-performance web server and reverse proxy.
# In this project it does TWO jobs:
#
#   JOB 1 — Serve the React app (static files from /usr/share/nginx/html)
#   JOB 2 — Proxy API calls to the backend service
#
# WHY DO WE NEED THIS FOR REACT?
# React is a Single Page Application (SPA). It has ONE HTML file (index.html).
# Client-side routing (React Router) works by JavaScript manipulating the URL
# bar WITHOUT actually loading a new page from the server.
#
# Problem: If a user visits http://yourapp.com/profile directly (or refreshes),
# NGINX tries to find a file at /profile — which doesn't exist → 404 error.
#
# Solution: The "try_files" directive below tells NGINX: "If the file doesn't
# exist, just serve index.html". React Router then reads the URL and renders
# the right page in JavaScript.
#
# WHY IS THE API PROXY HERE?
# The frontend (VITE_API_URL="") makes API calls to /api/... on the same host.
# NGINX intercepts those requests and forwards them to the backend container.
# This is called a REVERSE PROXY.
#
# BENEFIT: Browser sees everything on ONE origin (no CORS headers needed).
# Session cookies work seamlessly. No hardcoded backend URLs in the JS bundle.
# The same built image works in Docker Compose and Kubernetes — only the
# backend hostname changes (both environments name the service "backend").
# =============================================================================

server {
    # Listen on port 80 (standard HTTP port)
    listen 80;

    # The root directory where NGINX looks for files to serve.
    # This is where the Dockerfile copied the Vite build output (dist/).
    root /usr/share/nginx/html;

    # Default file to serve when a directory is requested
    index index.html;

    # -------------------------------------------------------------------------
    # API PROXY — Must be defined BEFORE the catch-all / block
    # -------------------------------------------------------------------------
    # Any request starting with /api/ is forwarded to the backend service.
    #
    # In Docker Compose:  backend service is named "backend" → http://backend:5000
    # In Kubernetes:      backend Service is named "backend"  → http://backend:5000
    # Same hostname! Same config file works in both environments.
    #
    # proxy_pass              → Where to forward the request
    # proxy_http_version 1.1  → Use HTTP/1.1 (required for keep-alive)
    # proxy_set_header        → Forward the original request headers so the
    #                           backend knows the real client IP and host
    # -------------------------------------------------------------------------
    location /api/ {
        proxy_pass         http://backend:5000/api/;
        proxy_http_version 1.1;

        # Forward original headers to the backend
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Forward cookies (required for session-based auth)
        proxy_set_header   Cookie            $http_cookie;

        # Allow the proxy to pass Set-Cookie headers back to the browser
        proxy_pass_header  Set-Cookie;
    }

    # -------------------------------------------------------------------------
    # SPA CATCH-ALL — Serves index.html for all other routes
    # -------------------------------------------------------------------------
    # try_files checks for matching files in this order:
    #   $uri         → exact file match (e.g., /logo.png → serve the PNG)
    #   $uri/        → directory match
    #   /index.html  → fallback: serve index.html for unknown routes
    #                  React Router takes over from here
    # -------------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # -------------------------------------------------------------------------
    # PERFORMANCE: Cache static assets in the browser
    # -------------------------------------------------------------------------
    # Vite generates filenames with content hashes (e.g., main.abc123.js).
    # Since the hash changes when content changes, we can safely cache these
    # files for a long time. This makes repeat visits much faster.
    # -------------------------------------------------------------------------
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # -------------------------------------------------------------------------
    # GZIP COMPRESSION
    # -------------------------------------------------------------------------
    # Compress responses before sending to the browser.
    # Reduces JavaScript bundle size by ~70% over the wire → faster load times.
    # -------------------------------------------------------------------------
    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;
}
