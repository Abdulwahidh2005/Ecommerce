# =============================================================================
# KUBERNETES SECRET
# =============================================================================
# A Secret stores SENSITIVE data. It works like a ConfigMap but:
#   1. Values are Base64 encoded (not encrypted by default on disk, but
#      Kubernetes can be configured with encryption at rest)
#   2. Kubernetes does not log Secret values in API responses
#   3. Secrets can be mounted as files or injected as env vars
#
# IMPORTANT — BASE64 IS NOT ENCRYPTION:
# Base64 is just an encoding scheme. Anyone who can read the Secret object
# can decode the values. In production, you would:
#   - Enable Kubernetes encryption at rest
#   - Use an external secrets manager (HashiCorp Vault, AWS Secrets Manager)
#   - Use tools like Sealed Secrets or External Secrets Operator
# For a minikube learning environment, base64 Secrets are fine.
#
# HOW TO GENERATE BASE64 VALUES:
#   Linux/Mac:  echo -n "your-value" | base64
#   Windows:    [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes("your-value"))
#
# HOW TO DECODE (to verify):
#   echo "base64string" | base64 --decode
#
# IMPORTANT: The -n flag in echo prevents a trailing newline from being
# included in the base64 value (which would cause auth failures).
#
# NEVER commit real production secrets to git. Use .gitignore or a secrets
# management tool. This file uses example credentials for local development.
# =============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: ecommerce-secret   # Name used to reference this Secret from Deployments
type: Opaque               # "Opaque" = arbitrary user-defined data (most common type)
                           # Other types: kubernetes.io/tls (TLS certs), etc.

# "data" values must be Base64 encoded
data:
  # ---------------------------------------------------------------------------
  # MONGODB_URI — The full connection string for the backend to reach MongoDB
  # Plain text: mongodb://root:rootpassword@mongo:27017/olx_clone?authSource=admin
  # "mongo" is the name of the Kubernetes Service for MongoDB (defined in
  #  mongo-statefulset.yaml). Kubernetes DNS resolves "mongo" to the pod IP.
  # ---------------------------------------------------------------------------
  MONGODB_URI: bW9uZ29kYjovL3Jvb3Q6cm9vdHBhc3N3b3JkQG1vbmdvOjI3MDE3L29seF9jbG9uZT9hdXRoU291cmNlPWFkbWlu

  # ---------------------------------------------------------------------------
  # SESSION_SECRET — Used to sign session cookies (express-session)
  # Plain text: supersecretkey123changeme
  # CHANGE THIS to a long random string before any real deployment:
  #   openssl rand -base64 32
  # ---------------------------------------------------------------------------
  SESSION_SECRET: c3VwZXJzZWNyZXRrZXkxMjNjaGFuZ2VtZQ==

  # ---------------------------------------------------------------------------
  # MONGO_ROOT_PASSWORD — MongoDB root password
  # Plain text: rootpassword
  # Used by the MongoDB StatefulSet to initialize root credentials.
  # ---------------------------------------------------------------------------
  MONGO_ROOT_PASSWORD: cm9vdHBhc3N3b3Jk
