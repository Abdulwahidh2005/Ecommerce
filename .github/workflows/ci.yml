name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  backend-test:
    name: Backend - install, syntax check & tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Syntax check entrypoint
        run: node --check src/server.js

      - name: Run unit tests
        run: |
          npx vitest run --reporter=default --reporter=github-actions --reporter=json --outputFile=test-results.json

      - name: Publish test summary
        if: always()
        run: |
          if [ -f test-results.json ]; then
            node -e "
              const r = require('./test-results.json');
              const passed = r.numPassedTests || 0;
              const failed = r.numFailedTests || 0;
              const total = r.numTotalTests || 0;
              const fs = require('fs');
              fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY,
                '## Backend test results\n\n' +
                '| Status | Count |\n|---|---|\n' +
                '| ✅ Passed | ' + passed + ' |\n' +
                '| ❌ Failed | ' + failed + ' |\n' +
                '| 📊 Total | ' + total + ' |\n'
              );
            "
          fi

  frontend-build:
    name: Frontend - install & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npx vitest run --reporter=default --reporter=github-actions --reporter=json --outputFile=test-results.json

      - name: Publish test summary
        if: always()
        run: |
          if [ -f test-results.json ]; then
            node -e "
              const r = require('./test-results.json');
              const passed = r.numPassedTests || 0;
              const failed = r.numFailedTests || 0;
              const total = r.numTotalTests || 0;
              const fs = require('fs');
              fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY,
                '## Frontend test results\n\n' +
                '| Status | Count |\n|---|---|\n' +
                '| ✅ Passed | ' + passed + ' |\n' +
                '| ❌ Failed | ' + failed + ' |\n' +
                '| 📊 Total | ' + total + ' |\n'
              );
            "
          fi

      - name: Build production bundle
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  docker-build-push:
    name: Build & push Docker images
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            context: ./backend
          - name: frontend
            context: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image owner
        id: owner
        run: echo "value=$(echo '${{ env.IMAGE_OWNER }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/ecommerce-${{ matrix.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=ref,event=branch

      - name: Build & push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max
